<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./style.css" />
    <title>Serviços</title>
  </head>
  <body>
    <div class="backgroud-services" onclick="hideform()">
      <img src="./assets/backgroud.jpeg" alt="imagem do mundo mario" />
    </div>
    <header class="container-header">
      <img src="./assets/logo-header.png" alt="logo-header" />
      <a href="index.html">Home</a>
      <a href="#" onclick="showform()">Acelere Conosco</a>
      <a href="circuits.html">Circuitos</a>
    </header>
    <main class="container-services">
      <div>
        <img
          class="box-service"
          onclick="selectCharacters()"
          src="./assets/mario-kart.png"
          alt="mario-kart"
        />
      </div>
      <div>
        <img
          class="box-service"
          src="./assets/luigi-kart.png"
          alt="luigi-kart"
        />
      </div>
      <div>
        <img
          class="box-service"
          src="./assets/peach-kart.png"
          alt="peach-kart"
        />
      </div>
      <div>
        <img
          class="box-service"
          src="./assets/bowser-kart.png"
          alt="bowser-kart"
        />
      </div>
      <div>
        <img
          class="box-service"
          src="./assets/yoshi-kart.png"
          alt="yoshi-kart"
        />
      </div>
      <div>
        <img
          class="box-service"
          src="./assets/donkey-kart.png"
          alt="donkey-kart"
        />
      </div>
      <div>
        <img
          class="box-service"
          onclick="selectCharacters()"
          src="./assets/wario-kart.png"
          alt="wario-kart"
        />
      </div>
      <form
        action="https://formcarry.com/s/5VQoGI3U3Nh"
        class="box-form"
        method="post"
      >
        <input type="text" placeholder="Seu nome" name="name" />
        <input type="email" placeholder="Seu melhor email" name="email" />
        <textarea
          name="problem"
          id=""
          placeholder="Digite seu problema aqui..."
        ></textarea>
        <button type="submit">Pedir Orçamento</button>
      </form>
    </main>
    <a
      href="https://api.whatsapp.com/send/?phone=5511981363456"
      target="_blank"
    >
      <img src="./assets/whatsapp.png" alt="whatsapp" class="whatsapp-float" />
    </a>
  </body>
  <script src="./scripts.js"></script>
</html>
